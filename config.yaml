engine:
  name: "ROUGH-PATH-FORECASTER"
  version: "1.0.0"
  hf_results_repo: "P2SAMAPA/p2-etf-rough-path-forecaster-results"
  hf_source_repo: "P2SAMAPA/p2-etf-deepm-data"
  source_file: "data/master.parquet"

signature:
  depths: [2, 3, 4]
  lead_lag: true
  basepoint: true
  time_channel: true
  truncation_tolerance: 1e-6
  adaptive_depth_selection: true

kernel:
  type: "neumann_signature_kernel"
  tile_size: 500
  dynamic_truncation_epsilon: 1e-6
  cache_ttl_seconds: 86400
  parallel_tiles: 2

log_ode:
  solver: "dopri5"
  vector_field_hidden: [64, 64]
  compute_lyapunov: true
  rtol: 1e-5
  atol: 1e-6

training:
  fixed:
    start_year: 2008
    end_year: 2026
    train_ratio: 0.8
    val_ratio: 0.1
    test_ratio: 0.1
  shrinking:
    start_years: [2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024]
    end_year: 2026
    consensus_weights:
      annualized_return: 0.60
      sharpe_ratio: 0.20
      max_drawdown: 0.20

selection:
  conviction_top_n: 3
  trade_cost_bps: 12
  min_conviction_for_trade: 0.05

macro:
  columns: ["VIX", "DXY", "T10Y2Y", "TBILL_3M", "IG_SPREAD", "HY_SPREAD"]

universes:
  fi:
    benchmark: "AGG"
    tickers: ["TLT", "LQD", "HYG", "VNQ", "GLD", "SLV", "VCIT"]
  equity:
    benchmark: "SPY"
    tickers: ["SPY", "QQQ", "XLK", "XLF", "XLE", "XLV", "XLI", "XLY", "XLP", "XLU", "XLRE", "XLB", "GDX", "XME", "IWM"]
