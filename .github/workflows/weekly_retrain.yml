name: Weekly Retrain

on:
  schedule:
    - cron: '30 0 * * 0'  # Sunday 00:30 UTC
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to retrain'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - fi
          - equity

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    
    strategy:
      matrix:
        module: 
          - fi
          - equity
      # Run both modules in parallel, fail fast disabled to see both results
      fail-fast: false
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-
    
    - name: Cache HF datasets
      uses: actions/cache@v3
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-cache-${{ matrix.module }}
        restore-keys: ${{ runner.os }}-hf-cache-
    
    - name: Cache signature kernels
      uses: actions/cache@v3
      with:
        path: data/cache
        key: ${{ runner.os }}-sig-cache-${{ matrix.module }}-${{ github.run_id }}
        restore-keys: ${{ runner.os }}-sig-cache-${{ matrix.module }}-
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Train Fixed - ${{ matrix.module }}
      run: python train_fixed.py --module ${{ matrix.module }}
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
    
    - name: Train Shrinking - ${{ matrix.module }}
      run: python train_shrinking.py --module ${{ matrix.module }}
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
    
    - name: Upload to Hub - ${{ matrix.module }}
      run: python upload_to_hub.py --module ${{ matrix.module }}
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
    
    - name: Cache cleanup - ${{ matrix.module }}
      if: always()
      run: |
        rm -rf data/cache/temp_*
        rm -rf models_saved/temp_*
    
    - name: Set output
      if: success()
      run: |
        echo "status=success" >> $GITHUB_OUTPUT
    
    - name: Upload artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: logs-${{ matrix.module }}
        path: outputs/logs/
        retention-days: 7

  # Job that runs after both modules complete
  merge-and-upload:
    runs-on: ubuntu-latest
    needs: [retrain]
    if: always()
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: pip install huggingface-hub pyarrow pandas
    
    - name: Upload combined metadata
      run: python upload_to_hub.py --mode metadata
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
    
    - name: Send notification
      if: ${{ needs.retrain.result == 'success' }}
      run: |
        echo "✅ Weekly retrain completed successfully for both modules"
    
    - name: Send failure notification
      if: ${{ needs.retrain.result != 'success' }}
      run: |
        echo "⚠️ Weekly retrain had issues. Check logs for details."
