name: Weekly Retrain

on:
  schedule:
    - cron: '30 0 * * 0'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    
    strategy:
      matrix:
        module: [fi, equity]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Train Fixed - ${{ matrix.module }}
      run: python train_fixed.py --module ${{ matrix.module }}
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
    
    - name: Train Shrinking - ${{ matrix.module }}
      run: python train_shrinking.py --module ${{ matrix.module }}
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
    
    - name: Upload to Hub
      run: python upload_to_hub.py
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
